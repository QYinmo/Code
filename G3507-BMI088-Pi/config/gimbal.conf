# BMI088 SPI：两个 spidev 分别使用 CE0 和 CE1 硬件片选
accel_spi_device = /dev/spidev0.0
gyro_spi_device = /dev/spidev0.1
spi_speed_hz = 1000000
# ACC_CONF 0xAB：normal filter，800 Hz ODR；量程在驱动中固定为 ±6 g
accel_conf = 0xAB
# GYRO_BANDWIDTH 0x02：1000 Hz ODR / 116 Hz bandwidth；量程固定为 ±500 °/s
gyro_bandwidth = 0x02

# 树莓派 5 排针 GPIO14/15 示例；必须用 readlink/pinctrl 确认实机映射
uart_device = /dev/ttyAMA0
uart_baud = 460800
imu_frequency_hz = 500
uart_frequency_hz = 500
log_frequency_hz = 1

accel_cutoff_hz = 30
gyro_cutoff_hz = 45
mahony_kp = 1.5
mahony_ki = 0.02
mahony_accel_full_trust_error_g = 0.08
mahony_accel_reject_error_g = 0.30
mahony_integral_limit = 0.10
mahony_integral_decay_rate = 1.0
mahony_max_accel_reject_s = 0.30

yaw_kp = 4.0
yaw_ki = 0.0
yaw_kd = 0.08
yaw_max_rate_dps = 120
yaw_integral_limit = 20
yaw_deadband_deg = 0.05
yaw_target_slew_dps = 90
yaw_use_measured_rate = true

pitch_kp = 4.5
pitch_ki = 0.0
pitch_kd = 0.10
pitch_max_rate_dps = 90
pitch_integral_limit = 20
pitch_deadband_deg = 0.05
pitch_target_slew_dps = 90
pitch_use_measured_rate = true

# 0/1/2 分别选择轴映射后的 body X/Y/Z；符号只能为 +1 或 -1
yaw_rate_body_axis = 2
pitch_rate_body_axis = 1
yaw_rate_sign = 1
pitch_rate_sign = 1

default_target_yaw_deg = 0
default_target_pitch_deg = 0
# 三行依次为 body_x/body_y/body_z，每行三个系数；必须是正交单位矩阵
axis_mapping = 1,0,0, 0,1,0, 0,0,1

calibration_seconds = 2.0
calibration_max_gyro_stddev_dps = 0.8
calibration_max_mean_rate_dps = 3.0
calibration_max_accel_stddev_g = 0.05
# 可选保存本次校准记录；控制仍使用本次内存中的实时校准值
save_calibration = false
calibration_output_file = config/calibration.conf
max_consecutive_spi_failures = 5
fault_recovery_success_frames = 25
command_timeout_s = 0.1
uart_frame_deadline_s = 0.010
uart_poll_timeout_ms = 1
# 安全默认：校准完成后保持 STOP，需人工输入 run
auto_run = false

# --uart-test 专用，程序还会施加 ±20 °/s 的独立安全限制
uart_test_yaw_rate_dps = 5.0
uart_test_pitch_rate_dps = 0.0
